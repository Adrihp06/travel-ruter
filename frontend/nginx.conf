# Rate limiting zones (http context)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml font/woff2 application/manifest+json;
    gzip_disable "MSIE [1-6]\.";

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.mapbox.com https://api.mapbox.com https://*.tile.openstreetmap.org https://lh3.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' ws: wss: https://*.mapbox.com https://api.mapbox.com https://events.mapbox.com; font-src 'self' data:; worker-src 'self' blob:; frame-ancestors 'none';" always;

    # Handle SPA routing - serve index.html for all routes
    # HTML must not be cached so deployments take effect immediately.
    # (add_header in a location overrides server-level headers, so repeat security headers)
    location / {
        limit_req zone=general burst=30 nodelay;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.mapbox.com https://api.mapbox.com https://*.tile.openstreetmap.org https://lh3.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' ws: wss: https://*.mapbox.com https://api.mapbox.com https://events.mapbox.com; font-src 'self' data:; worker-src 'self' blob:; frame-ancestors 'none';" always;
        expires 0;
        try_files $uri $uri/ /index.html;
    }

    # Service worker and registration script must never be cached
    location ~* ^/(sw|registerSW)\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires 0;
    }

    # Runtime env config must never be cached (regenerated on each container start)
    # CDN-Cache-Control tells Cloudflare specifically not to cache, even if a
    # Page Rule or default behaviour would otherwise cache .js files.
    location = /env-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires 0;
    }

    # Cache static assets (hashed filenames are safe to cache long-term)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Use Docker DNS resolver with short cache for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy orchestrator requests (AI chat service)
    # rewrite strips the /chat/ prefix before proxying:
    #   /chat/api/models       → orchestrator /api/models
    #   /chat/api/chat/stream  → orchestrator /api/chat/stream (WebSocket)
    #   /chat/health           → orchestrator /health
    location /chat/ {
        limit_req zone=api burst=20 nodelay;
        set $orchestrator_upstream http://orchestrator:3001;
        rewrite ^/chat/(.*)$ /$1 break;
        proxy_pass $orchestrator_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Proxy MCP remote server requests (Claude Desktop/Code clients)
    location /mcp {
        set $mcp_upstream http://mcp-remote:8002;
        proxy_pass $mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Return JSON error instead of HTML when upstream is down
        proxy_intercept_errors on;
        error_page 502 503 504 = @mcp_error;
    }

    # OAuth authorization server metadata for MCP clients (RFC 8414)
    location = /.well-known/oauth-authorization-server {
        set $mcp_upstream http://mcp-remote:8002;
        proxy_pass $mcp_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @mcp_error;
    }

    # OAuth protected resource metadata for MCP clients (RFC 9728)
    location /.well-known/oauth-protected-resource/ {
        set $mcp_upstream http://mcp-remote:8002;
        proxy_pass $mcp_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @mcp_error;
    }

    # JSON error response when MCP upstream is unavailable
    location @mcp_error {
        default_type application/json;
        return 503 '{"error":"MCP server unavailable","hint":"Ensure mcp-remote service is running with --profile prod"}';
    }

    # Auth endpoints — stricter rate limit to prevent brute-force attacks
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        set $backend_upstream http://backend:8000;
        rewrite ^/api/(.*)$ /api/v1/$1 break;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 75s;
    }

    # Proxy API requests to backend (rewrite /api/* → /api/v1/*)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        set $backend_upstream http://backend:8000;
        rewrite ^/api/(.*)$ /api/v1/$1 break;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 75s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
