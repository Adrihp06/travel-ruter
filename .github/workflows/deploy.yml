name: Build & Deploy to NAS

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger

env:
  DOCKER_HUB_USER: adrihp06
  BACKEND_IMAGE: adrihp06/travel-ruter-backend
  FRONTEND_IMAGE: adrihp06/travel-ruter-frontend
  ORCHESTRATOR_IMAGE: adrihp06/travel-ruter-orchestrator
  MCP_REMOTE_IMAGE: adrihp06/travel-ruter-mcp-remote
  DEPLOY_DIR: /volume1/00_Docker/travelruter

# Only allow one deployment at a time; cancel in-progress runs on new pushes
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_ORCHESTRATOR_URL=/chat
            VITE_AUTH_ENABLED=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push orchestrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./orchestrator/Dockerfile
          push: true
          tags: |
            ${{ env.ORCHESTRATOR_IMAGE }}:latest
            ${{ env.ORCHESTRATOR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push mcp-remote
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./mcp_server/Dockerfile
          push: true
          tags: |
            ${{ env.MCP_REMOTE_IMAGE }}:latest
            ${{ env.MCP_REMOTE_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted # NAS runner — see setup notes below
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Sync compose file to deploy directory
        run: |
          mkdir -p ${{ env.DEPLOY_DIR }}
          cp docker-compose.yml ${{ env.DEPLOY_DIR }}/docker-compose.yml

      - name: Pre-deploy diagnostics
        run: |
          echo "=== System resources ==="
          free -h || true
          df -h /volume1 || df -h / || true
          echo "=== Docker disk usage ==="
          docker system df || true
          echo "=== Runner user ==="
          whoami && id
          echo "=== Deploy dir ==="
          ls -la ${{ env.DEPLOY_DIR }}/
          file ${{ env.DEPLOY_DIR }}/.env 2>&1 || echo ".env not found"

      - name: Pull images sequentially
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          # Pull one at a time to avoid saturating NAS memory/network
          echo "Pulling backend..."
          docker pull ${{ env.BACKEND_IMAGE }}:latest
          echo "Pulling frontend..."
          docker pull ${{ env.FRONTEND_IMAGE }}:latest
          echo "Pulling orchestrator..."
          docker pull ${{ env.ORCHESTRATOR_IMAGE }}:latest
          echo "Pulling mcp-remote..."
          docker pull ${{ env.MCP_REMOTE_IMAGE }}:latest

      - name: Rolling deploy
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          # Rolling update: recreate containers without tearing everything down first.
          # docker compose up -d will only recreate containers whose image changed.
          docker compose --profile prod up -d --remove-orphans --wait --wait-timeout 120
          echo "=== All services reported healthy ==="

      - name: Post-deploy status
        if: always()
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          echo "=== Container status ==="
          docker compose --profile prod ps
          echo "=== Frontend logs (last 15) ==="
          docker logs travel_ruter_frontend 2>&1 | tail -15 || true
          echo "=== Backend logs (last 15) ==="
          docker logs travel_ruter_backend 2>&1 | tail -15 || true
          echo "=== Orchestrator logs (last 15) ==="
          docker logs travel_ruter_orchestrator 2>&1 | tail -15 || true

      - name: Cleanup old images
        if: always()
        run: |
          # Remove dangling images and build cache to free NAS disk space
          docker image prune -f || true
          # Remove images older than 48h that are no longer used
          docker image prune -a --filter "until=48h" -f 2>/dev/null || true

# =============================================================================
# Self-hosted runner setup (NAS)
# =============================================================================
# 1. Go to GitHub repo → Settings → Actions → Runners → New self-hosted runner
# 2. Follow the instructions for Linux (or Linux/ARM if your NAS uses ARM)
# 3. Install the runner as a service:
#      sudo ./svc.sh install && sudo ./svc.sh start
# 4. Ensure Docker and Docker Compose are available on the NAS
# 5. Place your .env file at /volume1/00_Docker/travelruter/.env
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME       — Docker Hub username (adrihp06)
#   DOCKERHUB_TOKEN          — Docker Hub access token (not password)
#   VITE_MAPBOX_ACCESS_TOKEN — Mapbox token (injected at runtime via .env on NAS)
